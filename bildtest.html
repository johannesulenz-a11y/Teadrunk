<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bild-Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #FAF9F5; }
  h2 { color: #D97757; }
  button { background: #D97757; color: white; border: none; padding: 12px 20px; border-radius: 999px; font-size: 16px; cursor: pointer; display: block; margin: 12px 0; }
  .result { margin: 10px 0; padding: 12px; background: white; border-radius: 8px; border: 1px solid #E5E2D9; font-size: 13px; word-break: break-all; }
  .ok { border-color: green; }
  .err { border-color: red; }
  img { max-width: 200px; max-height: 200px; display: block; margin-top: 8px; border: 1px solid #ccc; }
</style>
</head>
<body>
<h2>🖼️ Bild-Upload Test</h2>
<p>Wähle ein Foto — ich zeige was in jedem Schritt passiert.</p>

<input type="file" id="file-input" accept="image/*" style="margin-bottom:12px;">
<div id="results"></div>

<script>
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const out = document.getElementById('results');
  out.innerHTML = '';

  function log(msg, ok, extra) {
    const div = document.createElement('div');
    div.className = 'result ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
    div.innerHTML = msg + (extra ? '<br>' + extra : '');
    out.appendChild(div);
  }

  log('📁 Datei: ' + file.name + ' | Typ: "' + file.type + '" | Größe: ' + Math.round(file.size/1024) + ' KB');

  // Test 1: Read first 12 bytes
  try {
    const header = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(new Uint8Array(e.target.result));
      r.onerror = rej;
      r.readAsArrayBuffer(file.slice(0, 12));
    });
    const hex = Array.from(header).map(b => b.toString(16).padStart(2,'0')).join(' ');
    let mime = 'image/jpeg';
    if(header[0]===0x89 && header[1]===0x50) mime = 'image/png';
    else if(header[0]===0x47 && header[1]===0x49) mime = 'image/gif';
    else if(header[0]===0x52 && header[1]===0x49) mime = 'image/webp';
    log('✓ Magic Bytes: ' + hex + ' → MIME: ' + mime, true);

    // Test 2: createObjectURL with original file
    try {
      const url1 = URL.createObjectURL(file);
      const img1 = await new Promise((res, rej) => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = rej;
        i.src = url1;
      });
      log('✓ createObjectURL (original): ' + img1.width + 'x' + img1.height, true);
      URL.revokeObjectURL(url1);
    } catch(e) {
      log('✗ createObjectURL (original) FAILED: ' + e.message, false);
    }

    // Test 3: createObjectURL with typed Blob
    try {
      const blob = new Blob([file], {type: mime});
      const url2 = URL.createObjectURL(blob);
      const img2 = await new Promise((res, rej) => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = rej;
        i.src = url2;
      });
      log('✓ createObjectURL (typed Blob): ' + img2.width + 'x' + img2.height, true);

      // Test 4: Canvas toDataURL
      const canvas = document.createElement('canvas');
      canvas.width = img2.width;
      canvas.height = img2.height;
      canvas.getContext('2d').drawImage(img2, 0, 0);
      URL.revokeObjectURL(url2);
      const dataURL = canvas.toDataURL('image/jpeg', 0.85);
      log('✓ canvas.toDataURL: ' + dataURL.substring(0,50) + '... Länge: ' + dataURL.length, true);

      // Test 5: Display the result
      const imgEl = document.createElement('img');
      imgEl.src = dataURL;
      imgEl.onerror = () => log('✗ Bild konnte nicht angezeigt werden!', false);
      imgEl.onload = () => log('✓ Bild wird korrekt angezeigt!', true, '<img src="' + dataURL + '">');
      out.appendChild(imgEl);

    } catch(e) {
      log('✗ typed Blob FAILED: ' + e.message, false);
    }

    // Test 6: readAsDataURL (old approach for comparison)
    try {
      const dataURL2 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      log('readAsDataURL prefix: ' + dataURL2.substring(0,60));
      const img3 = document.createElement('img');
      img3.src = dataURL2;
      img3.onerror = () => log('✗ readAsDataURL Bild NICHT anzeigbar', false);
      img3.onload = () => log('✓ readAsDataURL Bild anzeigbar');
      out.appendChild(img3);
    } catch(e) {
      log('✗ readAsDataURL FAILED: ' + e.message, false);
    }

  } catch(e) {
    log('✗ Header lesen fehlgeschlagen: ' + e.message, false);
  }
});
</script>
</body>
</html>
